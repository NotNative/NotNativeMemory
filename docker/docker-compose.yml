name: notnative-memory

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: MCP-postgres
    restart: unless-stopped
    # Only started by the "full" profile (local DB + server). In "server"
    # profile the DB is remote, so this service stays down.
    profiles: ["full"]
    # Intentionally NOT declaring env_file here. Every variable Postgres
    # needs is already in the `environment:` block below, interpolated
    # from the installer's process environment. Pulling it from ../.env
    # would require .env to exist when the installer first runs `compose
    # up postgres`, which is a chicken-and-egg: .env is written after
    # Postgres is healthy. The mcp service DOES need env_file for its
    # DB-connection values, and by the time it starts .env is present.
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${MEMORY_DB_NAME:-notnative_memory}
      POSTGRES_USER: ${MEMORY_DB_USER:-memory}
      POSTGRES_PASSWORD: ${MEMORY_DB_PASSWORD:?Set MEMORY_DB_PASSWORD in .env}
      # Non-superuser app role. 02-roles.sh reads these at init time
      # to CREATE the role that the MCP container connects as. With
      # this role in place, RLS policies actively enforce; without,
      # the app falls back to the superuser connection and RLS is
      # inert. See docs/rls-activation.md.
      MEMORY_APP_DB_USER: ${MEMORY_APP_DB_USER:-memory_app}
      MEMORY_APP_DB_PASSWORD: ${MEMORY_APP_DB_PASSWORD:-}
    volumes:
      - ./postgres:/var/lib/postgresql/data
      # Auto-create schema on first init. All statements use IF NOT EXISTS
      # so this is safe if the database was previously initialized.
      - ../config/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      # Create the non-superuser app role after the schema lands.
      # Docker init scripts run in alphabetical order, so 02- runs
      # after 01-. Idempotent: skips CREATE if the role exists.
      - ../docker/init/02-roles.sh:/docker-entrypoint-initdb.d/02-roles.sh:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MEMORY_DB_USER:-memory} -d ${MEMORY_DB_NAME:-notnative_memory}"]
      interval: 5s
      timeout: 3s
      retries: 5

  mcp:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: MCP-server
    restart: unless-stopped
    # "full" brings up postgres + mcp; "server" brings up only mcp
    # pointing at a remote database (host/port come from ../.env).
    # `required: false` on the postgres dep tells Compose the dependency
    # is optional, so `--profile server` (which excludes postgres) is
    # still a valid project. In the full profile the healthcheck gate
    # still applies.
    profiles: ["full", "server"]
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    environment:
      # DB connection comes entirely from ../.env so the same compose file
      # works for local Docker Postgres (MEMORY_DB_HOST=postgres) and remote
      # Postgres (MEMORY_DB_HOST=some.host). The installer writes the right
      # values into .env based on the selected mode.
      MEMORY_MODEL_PATH: models/gte-large-en-v1.5
      MEMORY_DEFAULT_PROJECT: ${MEMORY_DEFAULT_PROJECT:-}
    volumes:
      # Embedding model downloaded during install, mounted read-only.
      - ../models:/app/models:ro
      # Writable runtime state: admin bootstrap token on first-run,
      # any future operator-readable artifacts. Bind-mounted to the
      # host so the operator can `cat state/admin_bootstrap.txt`
      # without docker-exec-ing into the container.
      - ../state:/app/state
    ports:
      - "${MCP_PORT:-9500}:9500"
    networks:
      - internal

networks:
  internal:
    driver: bridge

