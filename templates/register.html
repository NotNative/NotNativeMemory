{% extends "base.html" %}
{% block title %}Register — NotNativeMemory{% endblock %}
{% block content %}
<h1>Register</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form class="stacked" method="post" action="/register">
  <label>
    Username
    <input name="username" required autofocus autocomplete="username"
           pattern="[A-Za-z0-9_.\-]{1,64}"
           title="Letters, digits, dot, dash, underscore. Up to 64 characters.">
  </label>
  <label>
    Password
    <input name="password" type="password" required minlength="8"
           autocomplete="new-password">
  </label>
  <label>
    Confirm password
    <input name="password_confirm" type="password" required minlength="8"
           autocomplete="new-password">
  </label>
  <button type="submit">Create account</button>
</form>
<p style="margin-top: 1.5em;">
  Already have an account? <a href="/login">Log in</a>.
</p>
{% endblock %}
